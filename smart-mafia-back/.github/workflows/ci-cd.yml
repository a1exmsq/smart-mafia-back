name: Smart Mafia CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/smart-mafia

jobs:
  # ── 1. Lint & Test ───────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, game-service, ai-service]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mafia
          POSTGRES_PASSWORD: mafia_secret
          POSTGRES_DB: mafia_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Generate Prisma client
        working-directory: ${{ matrix.service }}
        if: matrix.service != 'ai-service'
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://mafia:mafia_secret@localhost:5432/mafia_db

      - name: Run Prisma migrations
        working-directory: ${{ matrix.service }}
        if: matrix.service != 'ai-service'
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://mafia:mafia_secret@localhost:5432/mafia_db

      - name: Run unit tests with coverage
        working-directory: ${{ matrix.service }}
        run: npm run test:cov
        env:
          DATABASE_URL: postgresql://mafia:mafia_secret@localhost:5432/mafia_db
          JWT_SECRET: test_secret_for_ci
          OPENAI_API_KEY: sk-test-mock-key
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: ${{ matrix.service }}/coverage/

  # ── 2. Build Docker images ───────────────────────────────────────────────────
  build:
    name: Build Docker (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [auth-service, game-service, ai-service]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to EC2 ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/smart-mafia-backend
            git pull origin main
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✅ Deployed at $(date)"
